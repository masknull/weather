name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Version is read from app/build.gradle.kts (versionName) at runtime

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Detect app versionName
        id: ver
        shell: bash
        run: |
          VERSION=$(grep -oE 'versionName\s*=\s*"[^"]+"' app/build.gradle.kts | head -n1 | sed -E 's/.*"([^"]+)"/\1/')
          if [ -z "$VERSION" ]; then
            echo "versionName not found" >&2
            exit 1
          fi
          echo "APP_VERSION_NAME=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Build release APK (arm64-v8a)
        run: ./gradlew assembleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Set up Android Build Tools (zipalign/apksigner)
        uses: android-actions/setup-android@v3

      - name: Install build-tools 34.0.0
        run: |
          yes | sdkmanager --licenses
          sdkmanager "build-tools;34.0.0"
          echo "${ANDROID_SDK_ROOT}/build-tools/34.0.0" >> $GITHUB_PATH
          echo "zipalign_path=$(command -v zipalign)" >> $GITHUB_STEP_SUMMARY
          echo "apksigner_path=$(command -v apksigner)" >> $GITHUB_STEP_SUMMARY

      - name: Generate temp keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/temp-release.jks \
            -storepass tempPass123 \
            -keypass tempPass123 \
            -alias tempalias \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Weather,O=Temp,C=CN"
          echo "SIGNING_KEY=$(base64 -w0 /tmp/temp-release.jks)" >> $GITHUB_ENV

      - name: Sign APK (manual apksigner)
        run: |
          APK_PATH=$(ls app/build/outputs/apk/release/*arm64*.apk | head -n 1)
          echo "APK=$APK_PATH"
          # zipalign
          zipalign -f -p 4 "$APK_PATH" /tmp/aligned.apk
          # sign
          apksigner sign \
            --ks /tmp/temp-release.jks \
            --ks-key-alias tempalias \
            --ks-pass pass:tempPass123 \
            --key-pass pass:tempPass123 \
            --out app/build/outputs/apk/release/Weather-arm64-v8a.apk \
            /tmp/aligned.apk
          # verify
          apksigner verify --verbose app/build/outputs/apk/release/Weather-arm64-v8a.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-arm64-v8a
          path: app/build/outputs/apk/release/*arm64*.apk
          if-no-files-found: error

      - name: Create Release (SemVer)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION_NAME }}
          name: "天气 v${{ env.APP_VERSION_NAME }}"
          files: app/build/outputs/apk/release/Weather-arm64-v8a.apk
          generate_release_notes: false
          body: |
            1.0.2 正式版更新内容

            修复
            - 修复 0 收藏或仅当前位置场景下主页卡片序列异常、滑动回弹、重复动画与顺序错误问题
            - 修复 搜索选城、当前位置跳转回 Weather 时不能正确进入目标卡片的问题
            - 修复 收藏 / 取消收藏后错误跳页、收藏状态判定不稳定、搜索页收藏删除失效等问题
            - 修复 未收藏当前位置时无法从左侧回到该卡片的问题

            新增
            - 新增 搜索页推荐城市三列网格
            - 新增 推荐区首位“当前位置”卡片，并支持自动定位请求与动态命名
            - 新增 天气主页与搜索页下拉刷新能力
            - 新增 收藏城市排序能力（当前为按钮上下移动）

            优化
            - 优化 城市 key 与每城市 locationKey 链路统一，天气数据匹配更准确
            - 优化 定位名称展示、卡片切换动画、24 小时 / 多日天气部分视觉细节与可读性
            - 优化 中文文案与整体主流程稳定性
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
