name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK (arm64-v8a)
        run: ./gradlew assembleRelease
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Set up Android Build Tools (zipalign/apksigner)
        uses: android-actions/setup-android@v3

      - name: Install build-tools 34.0.0
        run: |
          yes | sdkmanager --licenses
          sdkmanager "build-tools;34.0.0"
          echo "${ANDROID_SDK_ROOT}/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Generate temp keystore
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/temp-release.jks \
            -storepass tempPass123 \
            -keypass tempPass123 \
            -alias tempalias \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Weather,O=Temp,C=CN"
          echo "SIGNING_KEY=$(base64 -w0 /tmp/temp-release.jks)" >> $GITHUB_ENV

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ env.SIGNING_KEY }}
          alias: tempalias
          keyStorePassword: tempPass123
          keyPassword: tempPass123

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-arm64-v8a
          path: app/build/outputs/apk/release/*arm64*.apk
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Weather v${{ github.run_number }}"
          files: app/build/outputs/apk/release/*arm64*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
